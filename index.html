<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Destinos Travel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:
linear-gradient(rgba(255,255,255,.2),rgba(255,255,255,.2)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1800&q=80');
background-size:cover;
background-attachment:fixed;
color:#17335f;
}

header{
background:linear-gradient(135deg,#0b2d5c,#c9a646);
padding:50px 20px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,.2);
}

.logo-box{
background:white;
padding:20px 35px;
border-radius:30px;
display:inline-block;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo-box img{
width:420px;
max-width:95%;
}

.sub{
margin-top:18px;
color:white;
font-size:20px;
font-weight:bold;
}

section{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.card{
background:
linear-gradient(rgba(255,255,255,.94),rgba(255,255,255,.94)),
url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
padding:40px;
border-radius:24px;
box-shadow:0 10px 35px rgba(0,0,0,.15);
border-top:7px solid #c9a646;
margin-bottom:35px;
}

h2{
font-size:32px;
margin-bottom:25px;
color:#0b2d5c;
}
</html>
